schema_version: v1
definition_version: 1
id: factorio
name: Factorio Dedicated Server
metadata:
  completeness: partial
  confidence: inspected
  tested_versions: []
provenance:
  sources:
    - kind: url
      label: Factorio headless server download
      url: https://factorio.com/download
description: Factorio Linux dedicated server downloaded as an archive.
tags: [automation, survival, archive]
acquisition:
  mode: archive
  archive:
    url: https://factorio.com/get-download/stable/headless/linux64
    sha256: null
    strip_components: 1
runtime:
  image_profile: base
  image: ghcr.io/gametainer/base:local
  compatibility:
    supported: [native, fex]
    data_portability: same_runtime
    install_data: runtime_specific
    migration: same_runtime_only
    notes: Factorio server data is only validated within the same Gametainer runtime variant.
  min_cpu_millis: 500
  min_memory_mb: 1024
  ports:
    - name: game
      container: 34197
      container_from: process.args.port
      protocol: udp
  readiness:
    kind: log_pattern
    pattern: "Hosting game at IP ADDR:"
    timeout_seconds: 60
paths:
  persistent:
    - name: data
      mount: /data
  standard:
    - /game
    - /data
    - /config
    - /cache
    - /secrets
process:
  executable: /game/bin/x64/factorio
  working_dir: /game
lifecycle:
  pre_start:
    - name: create_save
      if_missing: /data/saves/world.zip
      args:
        - --create
        - "{{ process.args.save_path }}"
