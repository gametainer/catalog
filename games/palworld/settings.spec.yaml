schema_version: v1
spec_version: 1
game_id: palworld
display_name: Palworld Dedicated Server Settings
metadata:
  completeness: common
  confidence: inspected
  tested_versions: []
provenance:
  sources:
    - kind: url
      label: Palworld default settings example
      url: https://raw.githubusercontent.com/hmes98318/palworld-docker/refs/heads/main/DefaultPalWorldSettings.ini
    - kind: url
      label: Palworld server arguments
      url: https://docs.palworldgame.com/settings-and-operation/arguments/
    - kind: url
      label: Palworld configuration parameters
      url: https://docs.palworldgame.com/settings-and-operation/configuration/

files:
  palworld_settings:
    path: /game/Pal/Saved/Config/LinuxServer/PalWorldSettings.ini
    format: ue_option_settings
    section: /Script/Pal.PalGameWorldSettings
    entry: OptionSettings

settings:
  server.name:
    type: string
    default: Default Palworld Server
    env: GAMER_SETTING__SERVER__NAME
    targets: [{kind: file, file: palworld_settings, path: ServerName}]

  server.description:
    type: string
    default: ""
    env: GAMER_SETTING__SERVER__DESCRIPTION
    targets: [{kind: file, file: palworld_settings, path: ServerDescription}]

  server.admin_password:
    type: string
    default: ""
    env: GAMER_SETTING__SERVER__ADMIN_PASSWORD
    sensitive: true
    targets: [{kind: file, file: palworld_settings, path: AdminPassword}]

  server.password:
    type: string
    default: ""
    env: GAMER_SETTING__SERVER__PASSWORD
    sensitive: true
    targets: [{kind: file, file: palworld_settings, path: ServerPassword}]

  server.max_players:
    type: int
    default: 32
    env: GAMER_SETTING__SERVER__MAX_PLAYERS
    targets: [{kind: file, file: palworld_settings, path: ServerPlayerMaxNum}]

  server.public_ip:
    type: string
    default: ""
    env: GAMER_SETTING__SERVER__PUBLIC_IP
    targets: [{kind: file, file: palworld_settings, path: PublicIP}]

  server.public_port:
    type: int
    default: 8211
    env: GAMER_SETTING__SERVER__PUBLIC_PORT
    targets: [{kind: file, file: palworld_settings, path: PublicPort}]

  server.rcon.enabled:
    type: bool
    default: false
    env: GAMER_SETTING__SERVER__RCON__ENABLED
    targets: [{kind: file, file: palworld_settings, path: RCONEnabled}]

  server.rcon.port:
    type: int
    default: 25575
    env: GAMER_SETTING__SERVER__RCON__PORT
    targets: [{kind: file, file: palworld_settings, path: RCONPort}]

  server.rest_api.enabled:
    type: bool
    default: false
    env: GAMER_SETTING__SERVER__REST_API__ENABLED
    targets: [{kind: file, file: palworld_settings, path: RESTAPIEnabled}]

  server.rest_api.port:
    type: int
    default: 8212
    env: GAMER_SETTING__SERVER__REST_API__PORT
    targets: [{kind: file, file: palworld_settings, path: RESTAPIPort}]

  server.region:
